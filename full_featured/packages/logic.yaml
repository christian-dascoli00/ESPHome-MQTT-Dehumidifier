select:
  - platform: template
    name: "Dehumidifier Mode"
    id: mode
    icon: "mdi:autorenew"
    optimistic: true
    web_server:
      sorting_weight: 1
    options:
      - "Auto"
      - "Laundry"
      - "Ventilation"
    initial_option: "Auto"
    restore_value: yes
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state



switch:
  - platform: template
    id: state
    name: "Dehumidifier State"
    icon: "mdi:power"
    web_server:
      sorting_weight: 0
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      - if:
          condition:
            lambda: 'return id(boot_completed);'
          then:
            - script.execute: apply_logic
            - script.execute: publish_full_state





number: 
  - platform: template
    id: target_humidity
    optimistic: true
    name: "Target Humidity"
    icon: "mdi:target-variant"
    web_server:
      sorting_weight: 3
    device_class: humidity
    unit_of_measurement: "%"
    min_value: 30.0
    max_value: 80.0
    restore_value: yes
    initial_value: 55.0
    step: 1.0
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state




script:
  - id: apply_logic
    mode: queued
    then:
      - lambda: |-
          if (!id(state).state) {
            id(heat_pump).turn_off();
            id(fan).turn_off();
            return;
          }
  
          float hum = id(humidity).state;
          float target = id(target_humidity).state;
          std::string current_mode = id(mode).current_option();
  
          // ── AUTO ──────────────────────────────────────────────────────────

          if (current_mode == "auto") {
            if (isnan(hum)) {
              id(heat_pump).turn_off();
              id(fan).turn_off();
              return;
            }
            if (hum > (target + 3.0f)) {
              id(heat_pump).turn_on();
              id(fan).turn_on();
            } else if (hum < (target - 3.0f)) {
              id(heat_pump).turn_off();
              id(fan).turn_off();
            }
          }
  
          // ── LAUNDRY (ALWAYS ON) ───────────────────────────────────────────
          else if (current_mode == "Laundry") {
            id(heat_pump).turn_on();
            id(fan).turn_on();
          }
  
          // ── VENTILATION ───────────────────────────────────────────────────
          else if (current_mode == "Ventilation") {
            id(heat_pump).turn_off();
            id(fan).turn_on();
          }