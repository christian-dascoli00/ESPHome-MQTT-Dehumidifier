esphome:
  name: dehumidifier
  on_boot:
    - priority: 300
      then:
        - lambda: |-
            if (id(fan_high).state) {
              id(fan_speed).publish_state("high");
            } else {
              id(fan_speed).publish_state("low");
            }
    - priority: -100
      then:
        - wait_until:
            mqtt.connected:
        - script.execute: publish_discovery
        - delay: 500ms
        - script.execute: publish_full_state      

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG


ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: dehumidifier
  discover_ip: false
  discovery: false
  on_message:
 
    # ON / OFF
    - topic: dehumidifier/command
      then:
        - switch.control:
            id: state
            state: !lambda |-
              return x == "ON";
 
    - topic: dehumidifier/mode_command
      then:
        - lambda: |-
            id(mode).make_call().set_option(x).perform();
 
    # Target humidity
    - topic: dehumidifier/target_hum_cmd
      then:
        - lambda: |-
            float val = atof(x.c_str());
            if (val < 30.0f) val = 30.0f;
            if (val > 80.0f) val = 80.0f;
            id(target_humidity).make_call().set_value(val).perform();
 
    # Fan speed
    - topic: dehumidifier/fan_speed_cmd
      then:
        - lambda: |-
            id(fan_speed).make_call().set_option(x).perform();

script:
  - id: publish_discovery
    then:
      - mqtt.publish:
          topic: homeassistant/device/dehumidifier/config
          retain: true
          payload: !lambda |-
            return R"JSON({
              "dev": {
                "ids":  "PB-D-23-EU",
                "name": "Dehumidifier"
              },
              "o": {
                "name": "ESPHome"
              },
              "availability_topic": "dehumidifier/status", 
              "cmps": {
                "dehumidifier": {
                  "p":                             "humidifier",
                  "device_class":                  "dehumidifier",
                  "unique_id":                     "dehumidifier_pb_d_23_eu",
                  "name":                          "Dehumidifier",
                  "state_topic":                   "dehumidifier/state",
                  "command_topic":                 "dehumidifier/command",
                  "current_humidity_topic":        "dehumidifier/current_hum",
                  "target_humidity_state_topic":   "dehumidifier/target_hum_state",
                  "target_humidity_command_topic": "dehumidifier/target_hum_cmd",
                  "min_humidity": 30,
                  "max_humidity": 80,
                  "mode_state_topic":              "dehumidifier/mode_state",
                  "mode_command_topic":            "dehumidifier/mode_command",
                  "modes":                         ["auto", "laundry", "ventilation"],
                  "action_topic":                  "dehumidifier/action",
                  "optimistic":                    false
                },
                "fan_speed": {
                  "p":             "select",
                  "unique_id":     "fan_speed_pb_d_23_eu",
                  "name":          "Dehumidifier Fan Speed",
                  "state_topic":   "dehumidifier/fan_speed_state",
                  "command_topic": "dehumidifier/fan_speed_cmd",
                  "options":       ["low", "high"]
                }
              }
            })JSON";

  - id: publish_full_state
    then:
      - mqtt.publish:
          topic: dehumidifier/state
          payload: !lambda 'return id(state).state ? "ON" : "OFF";'
 
      - mqtt.publish:
          topic: dehumidifier/mode_state
          payload: !lambda |-
            return id(mode).current_option();
 
      - mqtt.publish:
          topic: dehumidifier/target_hum_state
          payload: !lambda 'return to_string((int)roundf(id(target_humidity).state));'
 
      - mqtt.publish:
          topic: dehumidifier/fan_speed_state
          payload: !lambda 'return id(fan_speed).current_option();'

      - mqtt.publish:
          topic: dehumidifier/action
          payload: !lambda |-
            if (!id(state).state) return std::string("off");
            if (id(heat_pump).state) return std::string("drying");
            return std::string("idle");

  - id: apply_logic
    then:
      - lambda: |-
          if (!id(state).state) {
            id(heat_pump).turn_off();
            id(fan).turn_off();
            return;
          }
  
          float hum = id(humidity).state;
          float target = id(target_humidity).state;
          std::string current_mode = id(mode).current_option();
  
          // ── AUTO ──────────────────────────────────────────────────────────

          if (current_mode == "auto") {
            if (hum > (target + 3.0f)) {
              id(heat_pump).turn_on();
              id(fan).turn_on();
            } else if (hum < (target - 3.0f)) {
              id(heat_pump).turn_off();
              id(fan).turn_off();
            }
          }
  
          // ── LAUNDRY (ALWAYS ON) ───────────────────────────────────────────
          else if (current_mode == "laundry") {
            id(heat_pump).turn_on();
            id(fan).turn_on();
          }
  
          // ── VENTILATION ───────────────────────────────────────────────────
          else if (current_mode == "ventilation") {
            id(heat_pump).turn_off();
            id(fan).turn_on();
          }

  

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_a


sensor:
  - platform: shtcx
    update_interval: 60s
    temperature:
      name: "Temperature"
      id: temperature
    humidity:
      name: "Humidity"
      id: humidity
      on_value:
        then:
          - mqtt.publish:
              topic: dehumidifier/current_hum
              payload: !lambda 'return to_string((int)roundf(x));'
          - script.execute: apply_logic
          - script.execute: publish_full_state


number: 
  - platform: template
    id: target_humidity
    optimistic: true
    name: "Target Humidity"
    min_value: 30.0
    max_value: 80.0
    restore_value: yes
    initial_value: 55.0
    step: 1.0
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state


switch:
  - platform: template #gpio
    #pin:
    id: heat_pump
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true # delete if gpio
 
  - platform: template #gpio
    #pin:
    id: fan
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true # delete if gpio

  - platform: template #gpio
    #pin:
    id: fan_high
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true # delete if gpio

  - platform: template
    id: state
    name: "Dehumidifier State"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state

select:
  - platform: template
    name: "Dehumidifier Fan Speed"
    id: fan_speed
    options:
      - "low"
      - "high"
    optimistic: true
    on_value:
      then:
        - switch.control: 
            id: fan_high
            state: !lambda 'return x == "high";'
        - script.execute: publish_full_state

  - platform: template
    name: "Dehumidifier Mode"
    id: mode
    optimistic: true
    options:
      - "auto"
      - "laundry"
      - "ventilation"
    initial_option: "auto"
    restore_value: yes
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state