esp32:
  board: esp32doit-devkit-v1
  framework:
    type: arduino


web_server:
  port: 80
  version: 3

ota:
  - platform: esphome
    password: ""

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: dehumidifier
  discover_ip: false
  discovery: false
  topic_prefix: ${entity_mqtt_name}
  on_message: !include mqtt/on_message.yaml


esphome:
  name: dehumidifier
  on_boot:
    - priority: -100
      then:
        - wait_until:
            mqtt.connected:
        - script.execute: publish_discovery
        - delay: 500ms
        - script.execute: publish_full_state  