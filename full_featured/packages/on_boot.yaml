- priority: 300
  then:
    - lambda: |-
        if (id(fan_speed).current_option() == "High") {
          id(fan_high).turn_on();
        } else {
          id(fan_high).turn_off();
        }
    - binary_sensor.template.publish:
        id: defrosting
        state: false
    - binary_sensor.template.publish:
        id: fan_forced
        state: false
    - lambda: 'id(boot_completed) = 1;'


- priority: -100
  then:
    - wait_until:
        mqtt.connected:
    - script.execute: publish_discovery
    - delay: 500ms
    - script.execute: publish_full_state  