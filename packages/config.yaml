esphome:
  name: dehumidifier
  on_boot: !include on_boot.yaml


web_server:
  port: 80

ota:
  - platform: esphome
    password: ""

logger:
  level: DEBUG

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: arduino


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: dehumidifier
  discover_ip: false
  discovery: false
  on_message: !include mqtt/on_message.yaml