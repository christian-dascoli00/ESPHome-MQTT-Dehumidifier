script:
  - id: publish_discovery
    then:
      - mqtt.publish:
          topic: homeassistant/device/dehumidifier/config
          retain: true
          payload: !lambda |-
            return R"JSON({
              "dev": {
                "ids": "${device_id}",
                "name": "${device_name}",
                "mf": "${manufacturer}",
                "mdl": "${model}"
              },
              "o": {
                "name": "ESPHome"
              },
              "availability_topic": "dehumidifier/status", 
              "cmps": {
                "dehumidifier": {
                  "p":                             "humidifier",
                  "device_class":                  "dehumidifier",
                  "unique_id":                     "dehumidifier_${entity_id}",
                  "name":                          "${dehumidifier_entity_name}",
                  "state_topic":                   "dehumidifier/state",
                  "command_topic":                 "dehumidifier/command",
                  "current_humidity_topic":        "dehumidifier/current_hum",
                  "target_humidity_state_topic":   "dehumidifier/target_hum_state",
                  "target_humidity_command_topic": "dehumidifier/target_hum_cmd",
                  "min_humidity": 30,
                  "max_humidity": 80,
                  "mode_state_topic":              "dehumidifier/mode_state",
                  "mode_command_topic":            "dehumidifier/mode_command",
                  "modes":                         ["Auto", "Laundry", "Ventilation"],
                  "action_topic":                  "dehumidifier/action",
                  "optimistic":                    false
                },
                "fan_speed": {
                  "p":             "select",
                  "unique_id":     "fan_speed_${entity_id}",
                  "name":          "Fan Speed",
                  "state_topic":   "dehumidifier/fan_speed_state",
                  "command_topic": "dehumidifier/fan_speed_cmd",
                  "icon":          "mdi:fan",
                  "options":       ["Low", "High"]
                },
                "heat_pump_cmd": {
                  "p":             "binary_sensor",
                  "unique_id":     "heat_pump_cmd_${entity_id}",
                  "name":          "Heat Pump Command",
                  "state_topic":   "dehumidifier/heat_pump_state",
                  "icon":          "mdi:heating-coil",
                  "entity_category": "diagnostic"
                },
                "heat_pump": {
                  "p":             "binary_sensor",
                  "unique_id":     "heat_pump_${entity_id}",
                  "name":          "Heat Pump",
                  "state_topic":   "dehumidifier/heat_pump",
                  "icon":          "mdi:heating-coil",
                  "entity_category": "diagnostic"
                },
                "fan_cmd": {
                  "p":             "binary_sensor",
                  "unique_id":     "fan_cmd_${entity_id}",
                  "name":          "Fan Command",
                  "state_topic":   "dehumidifier/fan_state",
                  "icon":          "mdi:fan",
                  "entity_category": "diagnostic"
                },
                "fan_forced": {
                  "p":             "binary_sensor",
                  "unique_id":     "fan_forced_${entity_id}",
                  "name":          "Fan Forced",
                  "state_topic":   "dehumidifier/fan_forced_state",
                  "entity_category": "diagnostic"
                },
                "defrosting": {
                  "p":             "binary_sensor",
                  "unique_id":     "defrosting_${entity_id}",
                  "name":          "Defrosting",
                  "icon":          "mdi:snowflake",
                  "state_topic":   "dehumidifier/defrosting_state"
                },
                "humidity": {
                  "p":             "sensor",
                  "unique_id":     "humidity_${entity_id}",
                  "name":          "Humidity Internal Sensor",
                  "state_topic":   "dehumidifier/internal_hum",
                  "device_class": "humidity",
                  "unit_of_measurement": "%",
                  "icon":          "mdi:water-percent",
                  "entity_category": "diagnostic"
                },
                "temperature": {
                  "p":             "sensor",
                  "unique_id":     "temperature_${entity_id}",
                  "name":          "Temperature Internal Sensor",
                  "state_topic":   "dehumidifier/internal_temp",
                  "device_class": "temperature",
                  "unit_of_measurement": "°C",
                  "icon":          "mdi:thermometer",
                  "entity_category": "diagnostic"
                },
                "use_external_humidity_sensor": {
                  "p":             "switch",
                  "unique_id":     "use_external_humidity_sensor_${entity_id}",
                  "name":          "Use External Humidity Sensor",
                  "state_topic":   "dehumidifier/use_external_humidity_sensor_state",
                  "command_topic": "dehumidifier/use_external_humidity_sensor_cmd",
                  "optimistic":    false,
                  "icon":          "mdi:cog",
                  "entity_category": "config"
                },
                "tank_full": {
                  "p":             "binary_sensor",
                  "unique_id":     "tank_full_${entity_id}",
                  "name":          "Tank Full",
                  "state_topic":   "dehumidifier/tank_full_state",
                  "icon":          "mdi:format-color-fill"
                },
                "current": {
                  "p":             "sensor",
                  "unique_id":     "current_${entity_id}",
                  "name":          "Current",
                  "state_topic":   "dehumidifier/current",
                  "device_class": "current",
                  "unit_of_measurement": "A",
                  "icon":          "mdi:current-ac"
                },
                "voltage": {
                  "p":             "sensor",
                  "unique_id":     "voltage_${entity_id}",
                  "name":          "Voltage",
                  "state_topic":   "dehumidifier/voltage",
                  "device_class": "voltage",
                  "unit_of_measurement": "V",
                  "icon":          "mdi:flash"
                },
                "power": {
                  "p":             "sensor",
                  "unique_id":     "power_${entity_id}",
                  "name":          "Power",
                  "state_topic":   "dehumidifier/power",
                  "device_class": "power",
                  "unit_of_measurement": "W",
                  "icon":          "mdi:flash"
                },
                "power_factor": {
                  "p":             "sensor",
                  "unique_id":     "power_factor_${entity_id}",
                  "name":          "Power Factor",
                  "unit_of_measurement": null,
                  "state_topic":   "dehumidifier/power_factor",
                  "device_class":  "power_factor",
                  "icon":          "mdi:flash"
                },
                "energy": {
                  "p":             "sensor",
                  "unique_id":     "energy_${entity_id}",
                  "name":          "Energy",
                  "state_topic":   "dehumidifier/energy",
                  "state_class":   "total_increasing",
                  "device_class": "energy",
                  "unit_of_measurement": "Wh",
                  "icon":          "mdi:flash"
                }
              }
            })JSON";