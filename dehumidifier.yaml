packages:
  - !include config.yaml
  - !include i2c_sensor.yaml
  - !include mqtt_discovery.yaml
  - !include mqtt_publish_state.yaml
  - !include apply_logic.yaml
  - !include defrosting.yaml
  - !include mode.yaml
  - !include fan_speed.yaml


esphome:
  name: dehumidifier
  on_boot: !include on_boot.yaml

substitutions:
  heat_pump_relay: GPIO32
  fan_speed_relay: GPIO25
  fan_relay: GPIO33


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password



mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: dehumidifier
  discover_ip: false
  discovery: false
  on_message: !include mqtt_on_message.yaml

sensor:
  - platform: mqtt_subscribe
    id: external_humidity
    name: "External Humidity"
    device_class: humidity
    unit_of_measurement: "%"
    topic: dehumidifier/external_hum

  - platform: template
    id: humidity
    lambda: |-
      if (id(use_external_humidity_sensor).state) {
        return id(external_humidity).state;
      } else {
        return id(internal_humidity).state;
      }
    on_value:
      then:
        - mqtt.publish:
            topic: dehumidifier/current_hum
            payload: !lambda 'return to_string((int)roundf(x));'
        - script.execute: apply_logic
        - script.execute: publish_full_state


switch:

  - platform: template
    id: use_external_humidity_sensor
    name: "Use External Sensor"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - mqtt.publish:
          topic: dehumidifier/use_external_humidity_sensor_state
          payload: "ON"
      - component.update: humidity
    on_turn_off:
      - mqtt.publish:
          topic: dehumidifier/use_external_humidity_sensor_state
          payload: "OFF"
      - component.update: humidity

  - platform: template
    id: state
    name: "Dehumidifier State"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state


  - platform: gpio
    pin: ${fan_relay}
    id: fan
    restore_mode: RESTORE_DEFAULT_OFF


  - platform: template
    id: heat_pump
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    on_turn_on:
      - if:
          condition:
            binary_sensor.is_off: defrosting
          then:
            - switch.turn_on: heat_pump_raw
    on_turn_off:
      - switch.turn_off: heat_pump_raw


  - platform: gpio
    id: heat_pump_raw
    pin: ${heat_pump_relay}
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - script.execute: defrost_timer
    on_turn_off:
      - if:
          condition:
            binary_sensor.is_off: defrosting
          then:
            - script.stop: defrost_timer


number: 
  - platform: template
    id: target_humidity
    optimistic: true
    name: "Target Humidity"
    device_class: humidity
    unit_of_measurement: "%"
    min_value: 30.0
    max_value: 80.0
    restore_value: yes
    initial_value: 55.0
    step: 1.0
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state


binary_sensor:
  - platform: template
    id: heat_pump_raw_state
    name: "Heat Pump"
    lambda: 'return id(heat_pump_raw).state;'
    # diagnostic entity