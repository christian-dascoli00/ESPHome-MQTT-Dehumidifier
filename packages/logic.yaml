select:
  - platform: template
    name: "Dehumidifier Mode"
    id: mode
    optimistic: true
    web_server:
      sorting_weight: 1
    options:
      - "auto"
      - "laundry"
      - "ventilation"
    initial_option: "auto"
    restore_value: yes
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state



switch:
  - platform: template
    id: state
    name: "Dehumidifier State"
    web_server:
      sorting_weight: 0
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state




number: 
  - platform: template
    id: target_humidity
    optimistic: true
    name: "Target Humidity"
    web_server:
      sorting_weight: 3
    device_class: humidity
    unit_of_measurement: "%"
    min_value: 30.0
    max_value: 80.0
    restore_value: yes
    initial_value: 55.0
    step: 1.0
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state




script:
  - id: apply_logic
    mode: queued
    then:
      - lambda: |-
          if (!id(state).state) {
            id(heat_pump).turn_off();
            id(fan).turn_off();
            return;
          }
  
          float hum = id(humidity).state;
          float target = id(target_humidity).state;
          std::string current_mode = id(mode).current_option();
  
          // ── AUTO ──────────────────────────────────────────────────────────

          if (current_mode == "auto") {
            if (hum > (target + 3.0f)) {
              id(heat_pump).turn_on();
              id(fan).turn_on();
            } else if (hum < (target - 3.0f)) {
              id(heat_pump).turn_off();
              id(fan).turn_off();
            }
          }
  
          // ── LAUNDRY (ALWAYS ON) ───────────────────────────────────────────
          else if (current_mode == "laundry") {
            id(heat_pump).turn_on();
            id(fan).turn_on();
          }
  
          // ── VENTILATION ───────────────────────────────────────────────────
          else if (current_mode == "ventilation") {
            id(heat_pump).turn_off();
            id(fan).turn_on();
          }