select:
  - platform: template
    name: "Dehumidifier Mode"
    id: mode
    optimistic: true
    options:
      - "auto"
      - "laundry"
      - "ventilation"
    initial_option: "auto"
    restore_value: yes
    on_value:
      then:
        - script.execute: apply_logic
        - script.execute: publish_full_state