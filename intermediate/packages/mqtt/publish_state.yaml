script:
  - id: publish_full_state
    then:
    
      - mqtt.publish:
          topic: ${entity_mqtt_name}/state
          payload: !lambda 'return id(state).state ? "ON" : "OFF";'
 
      - mqtt.publish:
          topic: ${entity_mqtt_name}/mode_state
          payload: !lambda |-
            return id(mode).current_option();
 
      - mqtt.publish:
          topic: ${entity_mqtt_name}/target_hum_state
          payload: !lambda 'return to_string((int)roundf(id(target_humidity).state));'
      
      - mqtt.publish:
          topic: ${entity_mqtt_name}/current_hum
          payload: !lambda 'return to_string((int)roundf(id(humidity).state));'
 
      - mqtt.publish:
          topic: ${entity_mqtt_name}/action
          payload: !lambda |-
            if (!id(state).state) return std::string("off");
            if (id(drying).state) return std::string("drying");
            return std::string("idle");